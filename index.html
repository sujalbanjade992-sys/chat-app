<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal Networks Elite</title>
    <style>
        :root { --accent: #00ff88; --bg: #0b0b0d; --card: #121215; }
        body { background: var(--bg); color: white; margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 250px; background: var(--card); border-right: 1px solid #222; display: flex; flex-direction: column; }
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        
        .header { padding: 15px; background: var(--card); border-bottom: 1px solid #222; color: var(--accent); font-weight: 800; display: flex; justify-content: space-between; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; flex-direction: column; max-width: 80%; }
        .sent { align-self: flex-end; align-items: flex-end; }
        .received { align-self: flex-start; align-items: flex-start; }
        
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; cursor: pointer; transition: 0.2s; }
        .sent .bubble { background: #007bff; border-bottom-right-radius: 2px; }
        .received .bubble { background: #222; border: 1px solid #333; border-bottom-left-radius: 2px; }
        
        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 5px; }
        
        #form { padding: 15px; background: var(--card); display: flex; gap: 10px; }
        input { flex: 1; background: #1a1a1d; border: 1px solid #333; padding: 12px; color: white; border-radius: 25px; outline: none; }
        .send-btn { background: var(--accent); color: black; border: none; padding: 0 20px; border-radius: 25px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding:20px; font-weight:800; color:var(--accent);">CHATS</div>
        <div id="user-list"></div>
        <button onclick="setTarget('global')" style="margin-top:auto; padding:20px; background:#1a1a1d; border:none; color:var(--accent); cursor:pointer; font-weight:800;">🌍 GLOBAL ROOM</button>
    </div>

    <div id="chat-area">
        <div class="header">
            <span id="target-title">Global Room</span>
            <span style="font-size:12px; opacity:0.5;">Sujal Networks Elite</span>
        </div>
        <div id="messages"></div>
        <form id="form" onsubmit="sendMessage(event)">
            <input id="input" placeholder="Type a message..." autocomplete="off">
            <button class="send-btn">SEND</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = localStorage.getItem('chat-name') || prompt("Enter your Name:");
        localStorage.setItem('chat-name', myName);
        let targetId = 'global';

        socket.emit('login', myName);

        function setTarget(id, name = "Global Room") {
            targetId = id;
            document.getElementById('target-title').innerText = name;
            document.getElementById('messages').innerHTML = '';
            socket.emit('login', myName); // Re-fetch history for new target
        }

        function sendMessage(e) {
            e.preventDefault();
            const text = document.getElementById('input').value;
            if(!text) return;

            socket.emit('chat message', {
                senderName: myName,
                text: text,
                target: targetId,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            document.getElementById('input').value = '';
        }

        socket.on('chat message', (msg) => {
            const isMe = msg.senderName === myName;
            const row = document.createElement('div');
            row.id = `msg-${msg._id}`;
            row.className = `msg-row ${isMe ? 'sent' : 'received'}`;
            
            row.innerHTML = `
                <div class="bubble" oncontextmenu="confirmDelete(event, '${msg._id}', '${msg.senderName}')">
                    ${msg.text}
                </div>
                <div class="msg-info">${msg.senderName} • ${msg.time}</div>
            `;
            
            document.getElementById('messages').appendChild(row);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
        });

        function confirmDelete(e, id, owner) {
            e.preventDefault();
            if(owner === myName && confirm("Unsend for everyone?")) {
                socket.emit('delete message', id);
            }
        }

        socket.on('message deleted', id => {
            const el = document.getElementById(`msg-${id}`);
            if(el) el.remove();
        });

        socket.on('load old msgs', msgs => {
            document.getElementById('messages').innerHTML = '';
            msgs.forEach(m => socket.emit('chat message', m));
        });
    </script>
</body>
</html>
