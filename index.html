
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal Networks Hybrid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #0b0b0d; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; }

        #login-screen { background: #151518; padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        .logo { color: #00ff88; font-size: 24px; font-weight: 800; margin-bottom: 20px; display: block; }
        input { width: 100%; background: #222; border: 1px solid #444; padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; font-size: 16px; }
        .btn { width: 100%; background: #00ff88; color: black; padding: 15px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #00cc6e; transform: translateY(-2px); }

        #chat-app { display: none; width: 100%; height: 100vh; flex-direction: row; }
        
        /* Sidebar Upgrade */
        #sidebar { width: 280px; background: #121215; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-weight: 800; color: #00ff88; border-bottom: 1px solid #222; text-transform: uppercase; font-size: 12px; }
        
        .global-item { padding: 15px 20px; background: rgba(0, 255, 136, 0.1); color: #00ff88; cursor: pointer; font-weight: 800; margin: 10px; border-radius: 10px; text-align: center; border: 1px solid rgba(0, 255, 136, 0.2); }
        .global-item:hover { background: rgba(0, 255, 136, 0.2); }

        #user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .user-item::before { content: ""; width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; }
        .user-item:hover { background: #1e1e22; }
        .user-item.active { background: #007bff; color: white; }

        #chat-area { flex: 1; display: flex; flex-direction: column; background: #0b0b0d; }
        #chat-header { padding: 20px; background: #121215; border-bottom: 1px solid #222; font-weight: 700; color: #eee; font-size: 18px; }
        
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }

        .msg-box { display: flex; flex-direction: column; max-width: 75%; }
        .sent-box { align-self: flex-end; }
        .received-box { align-self: flex-start; }

        .u-name { font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; font-weight: 800; }
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .sent { background: #007bff; border-bottom-right-radius: 2px; }
        .received { background: #222; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .time { font-size: 9px; opacity: 0.4; margin-top: 5px; text-align: right; }

        #form { padding: 20px; background: #121215; display: flex; gap: 12px; border-top: 1px solid #222; }
        #input { flex: 1; margin-bottom: 0; background: #1a1a1d; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="login-screen">
        <span class="logo">SUJAL NETWORKS</span>
        <input type="text" id="username-input" placeholder="Type your name...">
        <button class="btn" onclick="login()">START CHATTING</button>
    </div>

    <div id="chat-app">
        <div id="sidebar">
            <div class="sidebar-header">Main Channels</div>
            <div class="global-item" onclick="selectGlobal()">🌐 GLOBAL CHAT</div>
            <div class="sidebar-header">Direct Messages</div>
            <div id="user-list"></div>
        </div>
        <div id="chat-area">
            <div id="chat-header">Global Community</div>
            <div id="messages"></div>
            <form id="form" onsubmit="sendMessage(event)">
                <input id="input" autocomplete="off" placeholder="Type a message..." />
                <button class="btn" style="width: auto; padding: 0 25px;">SEND</button>
            </form>
        </div>
    </div>

    <script>
        const socket = io();
        let currentMode = "global"; // "global" or "private"
        let currentReceiverId = null;
        let myName = "";

        function login() {
            myName = document.getElementById('username-input').value.trim();
            if (myName) {
                socket.emit('login', myName);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-app').style.display = 'flex';
            }
        }

        function selectGlobal() {
            currentMode = "global";
            currentReceiverId = null;
            document.getElementById('chat-header').innerText = "🌐 Global Community";
            document.getElementById('messages').innerHTML = ''; 
        }

        function selectUser(id, name) {
            currentMode = "private";
            currentReceiverId = id;
            document.getElementById('chat-header').innerText = "🔒 Private: " + name;
            document.getElementById('messages').innerHTML = ''; 
        }

        socket.on('user list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for (let id in users) {
                if (id !== socket.id) {
                    const el = document.createElement('div');
                    el.className = 'user-item';
                    el.innerText = users[id];
                    el.onclick = () => selectUser(id, users[id]);
                    list.appendChild(el);
                }
            }
        });

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (input.value.trim()) {
                if (currentMode === "global") {
                    socket.emit('chat message', { user: myName, text: input.value, time: time });
                } else {
                    socket.emit('private message', { toId: currentReceiverId, text: input.value, time: time });
                    addMessage('sent', myName, input.value, time);
                }
                input.value = '';
            }
        }

        // Handle Public Messages
        socket.on('chat message', (data) => {
            if (currentMode === "global") {
                addMessage(data.user === myName ? 'sent' : 'received', data.user, data.text, data.time);
            }
        });

        // Handle Private Messages
        socket.on('private message', (data) => {
            if (currentMode === "private" && data.fromId === currentReceiverId) {
                addMessage('received', data.fromName, data.text, data.time);
            } else {
                alert(`📩 New DM from ${data.fromName}`);
            }
        });

        function addMessage(type, user, text, time) {
            const container = document.createElement('div');
            container.className = `msg-box ${type}-box`;
            container.innerHTML = `
                <span class="u-name">${user}</span>
                <div class="msg ${type}">${text}</div>
                <span class="time">${time}</span>
            `;
            document.getElementById('messages').appendChild(container);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
        }
    </script>
</body>
</html>
