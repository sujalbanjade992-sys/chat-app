<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal Networks</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; margin: 0; }
        #login-container { background: #1e1e1e; padding: 2rem; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { padding: 10px; width: 80%; margin-bottom: 1rem; border-radius: 4px; border: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #main-content { display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>Welcome to Shosho</h2>
        <p>Just enter your name to start</p>
        <input type="text" id="userName" placeholder="Your Name">
        <br>
        <button onclick="enterApp()">Enter Project</button>
    </div>

    <div id="main-content">
        <h1>Welcome, <span id="display-name"></span>!</h1>
        <p>The login system is gone. Everything is working now.</p>
    </div>

    <script>
        // Your specific config
        const firebaseConfig = {
            apiKey: "AIzaSyDazJG_ThTZKb75pyODj1IGMQQeaH7XupQ",
            authDomain: "sujal-networks.firebaseapp.com",
            projectId: "sujal-networks",
            storageBucket: "sujal-networks.firebasestorage.app",
            messagingSenderId: "835586269526",
            appId: "1:835586269526:web:c76ee92b9951499e8176f7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function enterApp() {
            const name = document.getElementById('userName').value;

            if (name.trim() === "") {
                alert("Please enter a name!");
                return;
            }

            try {
                // Just save the name to your database
                await db.collection("visitors").add({
                    name: name,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Hide login, show content
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('display-name').innerText = name;
                document.getElementById('main-content').style.display = 'block';
                
                console.log("Success! No Auth needed.");
            } catch (error) {
                console.error("Error: ", error);
                alert("Check your Firebase Rules! Make sure they are set to 'allow read, write: if true;'");
            }
        }
    </script>
</body>
</html>
