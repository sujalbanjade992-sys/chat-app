<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal's Network | Elite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d2ff;
            --accent: #00f2fe;
            --bg: #080808;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-dim: #a0a0a0;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease; }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #080808 100%);
            color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; 
        }

        /* --- ENTRY SCREEN --- */
        #entry-screen { 
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            padding: 50px; border-radius: 30px; text-align: center; width: 400px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-weight: 700; letter-spacing: -1px; margin-bottom: 30px; font-size: 32px; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .elite-input {
            width: 100%; padding: 16px; margin-bottom: 20px; border-radius: 15px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); color: white; font-size: 16px; outline: none;
        }
        .elite-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }

        .btn-glow {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: var(--primary); color: #000; font-weight: 700; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0, 210, 255, 0.6); }

        /* --- MAIN APP INTERFACE --- */
        #main-app { 
            display: none; width: 95vw; max-width: 1100px; height: 85vh; 
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 32px; border: 1px solid var(--border); overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar { 
            width: 280px; background: rgba(0,0,0,0.3); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 30px 20px; 
        }

        .section-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; padding-left: 10px; }

        .user-item { 
            padding: 14px 18px; cursor: pointer; border-radius: 16px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600;
        }
        .user-item:hover { background: rgba(255,255,255,0.05); }
        .user-item.active { background: rgba(0, 210, 255, 0.15); color: var(--primary); border: 1px solid rgba(0, 210, 255, 0.2); }
        
        .status-dot { height: 10px; width: 10px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }

        /* Chat Window Styling */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.1); }

        #chat-header { padding: 25px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #chat-title { font-size: 20px; font-weight: 700; }

        #messages-container { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

        /* Modern Bubbles */
        .msg-row { display: flex; flex-direction: column; margin-bottom: 5px; }
        .msg { 
            padding: 14px 20px; border-radius: 20px; max-width: 70%; font-size: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .msg.me { align-self: flex-end; background: var(--primary); color: #000; font-weight: 500; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #1e1e1e; color: white; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        
        .msg-info { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; padding: 0 10px; }

        .unsend-btn { 
            font-size: 10px; color: #ff4d4d; cursor: pointer; border: none; background: none; 
            margin-top: 6px; font-weight: 700; opacity: 0; transition: 0.2s;
        }
        .msg-row:hover .unsend-btn { opacity: 1; }

        /* Input Area */
        #input-area { padding: 25px 30px; background: rgba(0,0,0,0.2); display: flex; gap: 15px; border-top: 1px solid var(--border); }
        #msgInput { flex: 1; margin-bottom: 0; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 15px; padding: 15px; color: white; outline: none; }
        #msgInput:focus { border-color: var(--primary); }

        .send-button {
            width: 55px; height: 55px; border-radius: 15px; border: none; background: var(--primary);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="entry-screen">
        <h1>SUJAL'S NETWORK</h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Accessing encrypted communication node...</p>
        <input type="text" id="userNameInput" class="elite-input" placeholder="Enter Agent Name">
        <button class="btn-glow" onclick="joinApp()">INITIALIZE SESSION</button>
    </div>

    <div id="main-app">
        <div id="sidebar">
            <div class="section-label">Active Agents</div>
            <div id="users-list">
                <div class="user-item active" onclick="setChatTarget('global')">
                    <span style="font-size: 18px;">🌍</span> Global Network
                </div>
            </div>
        </div>

        <div id="chat-area">
            <div id="chat-header">
                <div>
                    <div id="chat-title">Global Network</div>
                    <div style="font-size: 12px; color: var(--primary); margin-top: 4px;" id="status-text">Encrypted Channel</div>
                </div>
                <div id="user-id-tag" style="background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 700; color: var(--primary);"></div>
            </div>
            
            <div id="messages-container"></div>

            <div id="input-area">
                <input type="text" id="msgInput" placeholder="Send secure message...">
                <button class="send-button" onclick="sendMessage()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDazJG_ThTZKb75pyODj1IGMQQeaH7XupQ",
            authDomain: "sujal-networks.firebaseapp.com",
            projectId: "sujal-networks",
            storageBucket: "sujal-networks.firebasestorage.app",
            messagingSenderId: "835586269526",
            appId: "1:835586269526:web:c76ee92b9951499e8176f7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = "";
        let chatTarget = "global";

        async function joinApp() {
            const name = document.getElementById('userNameInput').value.trim();
            if (!name) return;
            currentUser = name;

            await db.collection("online_users").doc(currentUser).set({
                name: currentUser,
                lastActive: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('user-id-tag').innerText = currentUser.toUpperCase();
            
            listenForUsers();
            loadMessages();
        }

        function setChatTarget(target) {
            chatTarget = target;
            document.getElementById('chat-title').innerText = target === 'global' ? 'Global Network' : 'Private: ' + target;
            document.getElementById('status-text').innerText = target === 'global' ? 'Secure Channel' : 'Encrypted DM';
            loadMessages();
        }

        async function sendMessage() {
            const text = document.getElementById('msgInput').value.trim();
            if (!text) return;

            await db.collection("messages").add({
                sender: currentUser,
                receiver: chatTarget,
                text: text,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('msgInput').value = "";
        }

        function listenForUsers() {
            db.collection("online_users").onSnapshot(snap => {
                const list = document.getElementById('users-list');
                list.innerHTML = `<div class="user-item ${chatTarget === 'global' ? 'active' : ''}" onclick="setChatTarget('global')"><span>🌍</span> Global Network</div>`;
                snap.forEach(doc => {
                    const user = doc.data().name;
                    if (user !== currentUser) {
                        const div = document.createElement('div');
                        div.className = `user-item ${chatTarget === user ? 'active' : ''}`;
                        div.innerHTML = `<span class="status-dot"></span> ${user}`;
                        div.onclick = () => setChatTarget(user);
                        list.appendChild(div);
                    }
                });
            });
        }

        function loadMessages() {
            db.collection("messages").orderBy("time", "asc").onSnapshot(snap => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isGlobal = m.receiver === 'global' && chatTarget === 'global';
                    const isDM = (m.sender === currentUser && m.receiver === chatTarget) || (m.sender === chatTarget && m.receiver === currentUser);

                    if (isGlobal || isDM) {
                        const isMe = m.sender === currentUser;
                        const msgRow = document.createElement('div');
                        msgRow.className = "msg-row";
                        msgRow.innerHTML = `
                            <div class="msg-info" style="${isMe ? 'text-align:right' : ''}">${m.sender}</div>
                            <div class="msg ${isMe ? 'me' : 'them'}">${m.text}</div>
                            ${isMe ? `<button class="unsend-btn" onclick="deleteMsg('${doc.id}')">UNSEND</button>` : ''}
                        `;
                        container.appendChild(msgRow);
                    }
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        async function deleteMsg(id) { if(confirm("Terminate message?")) await db.collection("messages").doc(id).delete(); }
        document.getElementById("msgInput").addEventListener("keyup", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
