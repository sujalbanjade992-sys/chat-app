<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal's Network | Elite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #00d2ff; --bg: #050505; --card: #121212; --text: #e0e0e0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #entry-screen { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; width: 380px; border: 1px solid #222; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        h1 { font-family: 'Poppins', sans-serif; color: var(--primary); font-size: 28px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        
        .btn-join { width: 100%; padding: 14px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        /* Main Chat Area */
        #main-app { display: none; width: 100%; max-width: 500px; height: 90vh; background: var(--card); border-radius: 24px; flex-direction: column; position: relative; border: 1px solid #222; }
        #chat-header { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        
        #messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Message Bubbles */
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 75%; position: relative; font-size: 15px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #252525; color: white; border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; margin-bottom: 4px; opacity: 0.7; font-weight: 600; }
        .unsend-btn { font-size: 10px; color: red; cursor: pointer; margin-top: 5px; background: none; border: none; padding: 0; text-align: right; }

        #input-area { padding: 20px; display: flex; gap: 10px; background: #181818; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
        .send-btn { background: var(--primary); border: none; border-radius: 12px; width: 60px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <h1>Sujal's Network</h1>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Elite Access Only</p>
        <input type="text" id="userNameInput" placeholder="Enter Identity...">
        <button class="btn-join" onclick="joinApp()">Initialize</button>
    </div>

    <div id="main-app">
        <div id="chat-header">
            <h2 style="margin: 0; font-family: 'Poppins'; font-size: 18px;">SECURE GLOBAL CHAT</h2>
            <div id="userTag" style="font-size: 11px; color: var(--primary); margin-top: 5px; opacity: 0.8;"></div>
        </div>
        <div id="messages-container"></div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Type a message..." style="margin-bottom: 0;">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDazJG_ThTZKb75pyODj1IGMQQeaH7XupQ",
            authDomain: "sujal-networks.firebaseapp.com",
            projectId: "sujal-networks",
            storageBucket: "sujal-networks.firebasestorage.app",
            messagingSenderId: "835586269526",
            appId: "1:835586269526:web:c76ee92b9951499e8176f7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = "";

        function joinApp() {
            const name = document.getElementById('userNameInput').value.trim();
            if (!name) return alert("Identify yourself!");
            currentUser = name;
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('userTag').innerText = "AGENT: " + currentUser.toUpperCase();
            loadMessages();
        }

        async function sendMessage() {
            const text = document.getElementById('msgInput').value.trim();
            if (!text) return;
            await db.collection("messages").add({
                user: currentUser,
                text: text,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('msgInput').value = "";
        }

        async function deleteMsg(id) {
            if(confirm("Unsend this message?")) {
                await db.collection("messages").doc(id).delete();
            }
        }

        function loadMessages() {
            db.collection("messages").orderBy("time", "asc").onSnapshot((snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.user === currentUser;
                    
                    const msgRow = document.createElement('div');
                    msgRow.className = "msg-row";
                    
                    msgRow.innerHTML = `
                        <div class="msg-info" style="${isMe ? 'text-align:right' : ''}">${data.user}</div>
                        <div class="msg ${isMe ? 'me' : 'them'}">
                            ${data.text}
                            ${isMe ? `<br><button class="unsend-btn" onclick="deleteMsg('${doc.id}')">Unsend</button>` : ''}
                        </div>
                    `;
                    container.appendChild(msgRow);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById("msgInput").addEventListener("keyup", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
