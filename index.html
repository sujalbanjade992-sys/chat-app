
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Chat</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f0f0f; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; color: #00ff88; }

        /* Message Area */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; line-height: 1.4; font-size: 15px; position: relative; }
        .received { background: #262626; align-self: flex-start; border-bottom-left-radius: 2px; }
        .sent { background: #007bff; align-self: flex-end; border-bottom-right-radius: 2px; color: white; }
        .user-label { font-size: 10px; color: #888; margin-bottom: 4px; display: block; }

        /* Input Area */
        #form { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #2b2b2b; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        button { background: #00ff88; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; color: #000; }
        button:hover { background: #00cc6e; }
    </style>
</head>
<body>
    <header>PRO CHAT ALPHA</header>
    <div id="messages"></div>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button>Send</button>
    </form>

    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        // Ask for a name when they join
        const myName = prompt("Enter your nickname:") || "Anonymous";

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                const data = { user: myName, text: input.value };
                socket.emit('chat message', data);
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const item = document.createElement('div');
            item.classList.add('msg');
            
            // Logic to see if YOU sent it or someone else
            if (data.user === myName) {
                item.classList.add('sent');
            } else {
                item.classList.add('received');
            }

            item.innerHTML = `<span class="user-label">${data.user}</span>${data.text}`;
            messages.appendChild(item);
            messages.scrollTo(0, messages.scrollHeight);
        });
    </script>
</body>
</html>
</body>
</html>
