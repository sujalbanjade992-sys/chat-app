
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sujal's Chat System</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0f0f0f; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { 
            background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #00ff88; 
            font-weight: 900; color: #00ff88; text-transform: uppercase; letter-spacing: 2px;
            display: flex; justify-content: space-between; align-items: center;
        }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Typing Indicator Style */
        #typing { font-size: 12px; color: #00ff88; padding: 0 20px 5px; height: 18px; font-style: italic; }

        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; display: flex; flex-direction: column; position: relative; }
        .received { background: #2b2b2b; align-self: flex-start; border-bottom-left-radius: 2px; }
        .sent { background: #007bff; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Image Bubble Styling */
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; border: 1px solid #444; }

        .user-label { font-size: 11px; font-weight: 800; margin-bottom: 3px; text-transform: uppercase; color: #00ff88; }
        .sent .user-label { color: #ade8ff; }
        .time { font-size: 9px; align-self: flex-end; margin-top: 4px; opacity: 0.6; }

        #form { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #333; border: none; padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        button { background: #00ff88; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <span>SUJAL NETWORKS</span>
        <button onclick="messages.innerHTML=''" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:4px 8px; border-radius:5px; font-size:10px;">CLEAR</button>
    </header>
    <div id="messages"></div>
    <div id="typing"></div>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Message or Image Link..." />
        <button>Send</button>
    </form>

    <script>
        const socket = io();
        const messages = document.getElementById('messages');
        const typingDiv = document.getElementById('typing');
        const input = document.getElementById('input');
        const myName = prompt("Enter nickname:") || "User";

        // --- Typing Logic ---
        input.addEventListener('input', () => {
            socket.emit('typing', { user: myName });
        });

        socket.on('display typing', (data) => {
            typingDiv.innerText = `${data.user} is typing...`;
            setTimeout(() => { typingDiv.innerText = ''; }, 2000);
        });

        // --- Message Logic ---
        document.getElementById('form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                socket.emit('chat message', { user: myName, text: input.value, time: time });
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const item = document.createElement('div');
            item.className = `msg ${data.user === myName ? 'sent' : 'received'}`;
            
            // Check if text is an image link
            const isImage = data.text.match(/\.(jpeg|jpg|gif|png)$/) != null || data.text.includes('images.unsplash.com');
            const content = isImage ? `<img src="${data.text}" class="chat-img" />` : `<span>${data.text}</span>`;

            item.innerHTML = `<span class="user-label">${data.user}</span>${content}<span class="time">${data.time}</span>`;
            messages.appendChild(item);
            messages.scrollTo(0, messages.scrollHeight);
        });
    </script>
</body>
</html>
