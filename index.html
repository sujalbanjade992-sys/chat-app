<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal's Network</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0f0f; 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /* Entry Screen */
        #entry-screen { 
            background: #1a1a1a; 
            padding: 40px; 
            border-radius: 12px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 350px;
        }
        
        h1 { color: #00d2ff; margin-bottom: 20px; font-size: 24px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 6px; 
            border: 1px solid #333; 
            background: #252525; 
            color: white; 
            font-size: 16px;
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
        }

        button:hover { opacity: 0.9; }

        /* Main Application (Hidden initially) */
        #main-app { 
            display: none; 
            text-align: center; 
            width: 90%; 
            max-width: 800px;
        }

        .card { 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 12px; 
            border-left: 5px solid #00d2ff;
        }
    </style>
</head>
<body>

    <div id="entry-screen">
        <h1>Sujal's Network</h1>
        <p>Enter your name to join</p>
        <input type="text" id="userNameInput" placeholder="Type your name...">
        <button onclick="joinNetwork()">Enter Network</button>
    </div>

    <div id="main-app">
        <div class="card">
            <h2>Welcome to the Network, <span id="userDisplayName"></span>!</h2>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <p>The login system has been removed. You are now connected to the database.</p>
            <p style="color: #888;">Current Project Status: Active</p>
            <button onclick="location.reload()" style="width: auto; padding: 10px 20px; margin-top: 20px; background: #333;">Sign Out / Exit</button>
        </div>
    </div>

    <script>
        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDazJG_ThTZKb75pyODj1IGMQQeaH7XupQ",
            authDomain: "sujal-networks.firebaseapp.com",
            projectId: "sujal-networks",
            storageBucket: "sujal-networks.firebasestorage.app",
            messagingSenderId: "835586269526",
            appId: "1:835586269526:web:c76ee92b9951499e8176f7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function joinNetwork() {
            const name = document.getElementById('userNameInput').value;

            if (!name) {
                alert("Please enter a name first!");
                return;
            }

            try {
                // 1. Save to Firestore (The 'visitors' folder)
                await db.collection("visitors").add({
                    name: name,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 2. Hide the entry screen and show the app
                document.getElementById('entry-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('userDisplayName').innerText = name;

            } catch (e) {
                console.error("Error connecting: ", e);
                alert("Database Error! Make sure you clicked 'Publish' on your Firestore Rules.");
            }
        }
    </script>
</body>
</html>
