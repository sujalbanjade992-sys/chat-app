<!DOCTYPE html>
<html>
<head>
    <title>Sujal Networks Elite</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 250px; background: #15191c; padding: 20px; border-right: 1px solid #333; }
        #main-chat { flex: 1; display: flex; flexDirection: column; padding: 20px; position: relative; }
        #chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; position: relative; }
        .my-message { align-self: flex-end; background: #007bff; color: white; }
        .other-message { align-self: flex-start; background: #2c2f33; }
        
        .message-info { font-size: 0.7em; margin-bottom: 5px; opacity: 0.8; }
        .delete-btn { position: absolute; top: 2px; right: 5px; background: none; border: none; color: white; cursor: pointer; opacity: 0.5; }
        .delete-btn:hover { opacity: 1; color: #ff4d4d; }
        
        #input-area { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #23272a; color: white; }
        button#send-btn { padding: 10px 20px; border-radius: 20px; border: none; background: #00ff88; color: black; font-weight: bold; cursor: pointer; }
        #typing-status { font-size: 0.8em; color: #00ff88; height: 20px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Channels</h3>
        <div onclick="changeRoom('global', 'Global Network')" style="cursor:pointer; color:#00ff88;">● Global Network</div>
        <hr>
        <h3>Direct Messages</h3>
        <div id="user-list"></div>
    </div>

    <div id="main-chat">
        <h2 id="chat-title">Global Network</h2>
        <div id="typing-status"></div>
        <div id="chat-box"></div>
        
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." oninput="handleTyping()">
            <button id="send-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = prompt("Enter your name:") || "Guest";
        let target = 'global';
        socket.emit('login', myName);

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                socket.emit('chat message', { text: input.value, target: target });
                input.value = '';
                socket.emit('typing', { target: target, isTyping: false });
            }
        }

        socket.on('chat message', (data) => {
            const chatBox = document.getElementById('chat-box');
            const isMe = data.name === myName;
            
            const div = document.createElement('div');
            div.id = `msg-${data.id}`;
            div.className = `message ${isMe ? 'my-message' : 'other-message'}`;
            div.innerHTML = `
                <div class="message-info">${data.name}</div>
                <div>${data.text}</div>
                ${isMe ? `<button class="delete-btn" onclick="deleteMsg('${data.id}')">×</button>` : ''}
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function deleteMsg(id) { socket.emit('delete message', { msgId: id }); }
        
        socket.on('message deleted', (id) => {
            const el = document.getElementById(`msg-${id}`);
            if (el) el.remove();
        });

        socket.on('load history', (history) => {
            document.getElementById('chat-box').innerHTML = '';
            history.forEach(msg => socket.emit('chat message internal', msg)); 
        });

        function handleTyping() {
            socket.emit('typing', { target: target, isTyping: true });
            clearTimeout(window.typingTimer);
            window.typingTimer = setTimeout(() => {
                socket.emit('typing', { target: target, isTyping: false });
            }, 2000);
        }

        socket.on('display typing', (data) => {
            const status = document.getElementById('typing-status');
            if (data.fromRoom === target) {
                status.innerText = data.isTyping ? `${data.name} is typing...` : '';
            }
        });

        function changeRoom(newTarget, name) {
            target = newTarget;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-box').innerHTML = '';
        }
    </script>
</body>
</html>
