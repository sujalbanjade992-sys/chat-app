
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sujal Networks Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top right, #1e1e2f, #0f0f0f);
            color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); /* This creates the glass effect */
            padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }

        .brand-box { display: flex; flex-direction: column; align-items: flex-start; }
        .brand-name { color: #00ff88; font-weight: 900; letter-spacing: 1px; font-size: 18px; }
        .user-online-badge { font-size: 10px; color: #aaa; display: flex; align-items: center; gap: 5px; }
        .dot { height: 8px; width: 8px; background: #00ff88; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #00ff88; }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Glassmorphic Messages */
        .msg { 
            max-width: 80%; padding: 12px 16px; border-radius: 20px; 
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
            position: relative; animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .received { background: rgba(255, 255, 255, 0.08); align-self: flex-start; border-bottom-left-radius: 2px; }
        .sent { background: rgba(0, 123, 255, 0.4); align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid rgba(0, 123, 255, 0.5); }

        .chat-img { max-width: 100%; border-radius: 12px; margin-top: 8px; }
        .user-label { font-size: 11px; font-weight: 800; margin-bottom: 4px; color: #00ff88; }
        .time { font-size: 9px; align-self: flex-end; margin-top: 6px; opacity: 0.5; }

        #typing { font-size: 11px; color: #00ff88; padding: 5px 25px; height: 20px; font-style: italic; }

        #form { 
            background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(20px);
            padding: 20px; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        input { 
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px 20px; border-radius: 30px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00ff88; background: rgba(255,255,255,0.1); }
        button { background: #00ff88; border: none; padding: 0 25px; border-radius: 30px; font-weight: 800; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <header>
        <div class="brand-box">
            <span class="brand-name">SUJAL NETWORKS</span>
            <div class="user-online-badge"><span class="dot"></span> <span id="count">1</span> Users Online</div>
        </div>
        <button onclick="if(confirm('Clear?'))messages.innerHTML=''" style="background:none; border:none; color:#ff4444; font-weight:bold; cursor:pointer;">CLEAR</button>
    </header>

    <div id="messages"></div>
    <div id="typing"></div>

    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type a message or paste image link..." />
        <button>Send</button>
    </form>

    <script>
        const socket = io();
        const messages = document.getElementById('messages');
        const typingDiv = document.getElementById('typing');
        const input = document.getElementById('input');
        const countSpan = document.getElementById('count');
        const myName = prompt("Nickname:") || "Guest";

        // Update Online Counter
        socket.on('user count', (num) => { countSpan.innerText = num; });

        input.addEventListener('input', () => { socket.emit('typing', { user: myName }); });
        socket.on('display typing', (data) => {
            typingDiv.innerText = `${data.user} is typing...`;
            setTimeout(() => { typingDiv.innerText = ''; }, 2000);
        });

        document.getElementById('form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                socket.emit('chat message', { user: myName, text: input.value, time: time });
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const item = document.createElement('div');
            item.className = `msg ${data.user === myName ? 'sent' : 'received'}`;
            const isImage = data.text.match(/\.(jpeg|jpg|gif|png)$/) != null;
            const content = isImage ? `<img src="${data.text}" class="chat-img" />` : `<span>${data.text}</span>`;
            item.innerHTML = `<span class="user-label">${data.user}</span>${content}<span class="time">${data.time}</span>`;
            messages.appendChild(item);
            messages.scrollTo(0, messages.scrollHeight);
        });
    </script>
</body>
</html>
