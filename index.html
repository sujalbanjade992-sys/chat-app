
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal Networks Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #0b0b0d; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; }

        #login-screen { background: #151518; padding: 40px; border-radius: 30px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { color: #00ff88; font-size: 28px; font-weight: 800; margin-bottom: 10px; display: block; letter-spacing: -1px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; display: block; }
        input { width: 100%; background: #222; border: 1px solid #444; padding: 16px; border-radius: 15px; color: white; margin-bottom: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: #00ff88; }
        .btn { width: 100%; background: #00ff88; color: black; padding: 16px; border-radius: 15px; font-weight: 800; border: none; cursor: pointer; }

        #chat-app { display: none; width: 100%; height: 100vh; flex-direction: row; }
        
        /* Sidebar */
        #sidebar { width: 300px; background: #121215; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px 10px; font-weight: 800; color: #555; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; border-radius: 12px; margin: 0 10px; }
        .nav-item:hover { background: #1e1e22; }
        .nav-item.active { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        .avatar { width: 35px; height: 35px; border-radius: 10px; background: #333; }

        #user-list { flex: 1; overflow-y: auto; }

        /* Chat Area */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #0b0b0d; }
        #chat-header { padding: 20px 30px; background: #121215; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }

        /* Messages */
        .msg-row { display: flex; gap: 12px; max-width: 80%; margin-bottom: 5px; }
        .sent-row { align-self: flex-end; flex-direction: row-reverse; }
        .msg-content { display: flex; flex-direction: column; }
        .bubble { padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .sent-bubble { background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .received-bubble { background: #222; color: #eee; border-bottom-left-radius: 4px; }
        .system-msg { align-self: center; background: rgba(255,255,255,0.05); font-size: 12px; color: #888; padding: 5px 15px; border-radius: 20px; }

        /* Media */
        .chat-img { max-width: 100%; border-radius: 12px; margin-top: 5px; cursor: pointer; }

        #form { padding: 20px 30px; background: #121215; display: flex; gap: 12px; align-items: center; }
        #file-input { display: none; }
        .icon-btn { background: #222; border: none; color: white; font-size: 20px; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <span class="logo">SUJAL NETWORKS</span>
        <span class="subtitle">Secure Elite Messaging System</span>
        <input type="text" id="username-input" placeholder="What is your name?">
        <button class="btn" onclick="login()">INITIALIZE SYSTEM</button>
    </div>

    <div id="chat-app">
        <div id="sidebar">
            <div class="sidebar-header">Main</div>
            <div class="nav-item active" onclick="selectGlobal()" id="global-btn">
                <div class="avatar" style="background: #00ff88; display: flex; align-items: center; justify-content: center; color: black; font-weight: 900;">G</div>
                <span>Global Room</span>
            </div>
            <div class="sidebar-header">Direct Messages</div>
            <div id="user-list"></div>
        </div>
        <div id="chat-area">
            <div id="chat-header">
                <img src="" id="header-avatar" class="avatar" style="display:none;">
                <span id="header-name" style="font-weight: 800;">Global Room</span>
            </div>
            <div id="messages"></div>
            <form id="form" onsubmit="sendMessage(event)">
                <label class="icon-btn">
                    +
                    <input type="file" id="file-input" accept="image/*" onchange="handleFile(this)">
                </label>
                <input id="input" autocomplete="off" placeholder="Message..." style="margin-bottom:0; flex:1;">
                <button class="btn" style="width: auto; padding: 0 25px;">SEND</button>
            </form>
        </div>
    </div>

    <script>
        const socket = io();
        let currentMode = "global";
        let currentReceiverId = null;
        let myName = "";
        let myAvatar = "";

        function login() {
            myName = document.getElementById('username-input').value.trim();
            if (myName) {
                myAvatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${myName}`;
                socket.emit('login', myName);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-app').style.display = 'flex';
            }
        }

        function handleFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const imageHtml = `<img src="${e.target.result}" class="chat-img" />`;
                    
                    if (currentMode === "global") {
                        socket.emit('chat message', { user: myName, avatar: myAvatar, text: imageHtml, time: time });
                    } else {
                        socket.emit('private message', { toId: currentReceiverId, text: imageHtml, time: time });
                        addMessage('sent', myName, myAvatar, imageHtml, time);
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        socket.on('user list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for (let id in users) {
                if (id !== socket.id) {
                    const el = document.createElement('div');
                    el.className = 'nav-item';
                    el.innerHTML = `<img src="${users[id].avatar}" class="avatar"> <span>${users[id].name}</span>`;
                    el.onclick = () => selectUser(id, users[id]);
                    list.appendChild(el);
                }
            }
        });

        function selectGlobal() {
            currentMode = "global";
            document.getElementById('header-name').innerText = "Global Room";
            document.getElementById('header-avatar').style.display = "none";
            document.getElementById('messages').innerHTML = '';
        }

        function selectUser(id, user) {
            currentMode = "private";
            currentReceiverId = id;
            document.getElementById('header-name').innerText = user.name;
            document.getElementById('header-avatar').src = user.avatar;
            document.getElementById('header-avatar').style.display = "block";
            document.getElementById('messages').innerHTML = '';
        }

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (input.value.trim()) {
                if (currentMode === "global") {
                    socket.emit('chat message', { user: myName, avatar: myAvatar, text: input.value, time: time });
                } else {
                    socket.emit('private message', { toId: currentReceiverId, text: input.value, time: time });
                    addMessage('sent', myName, myAvatar, input.value, time);
                }
                input.value = '';
            }
        }

        socket.on('chat message', (data) => {
            if (currentMode === "global") {
                if (data.isSystem) {
                    const sys = document.createElement('div');
                    sys.className = 'system-msg';
                    sys.innerText = data.text;
                    document.getElementById('messages').appendChild(sys);
                } else {
                    addMessage(data.user === myName ? 'sent' : 'received', data.user, data.avatar, data.text, data.time);
                }
            }
        });

        socket.on('private message', (data) => {
            if (currentMode === "private" && data.fromId === currentReceiverId) {
                addMessage('received', data.fromName, data.fromAvatar, data.text, data.time);
            }
        });

        function addMessage(type, name, avatar, text, time) {
            const row = document.createElement('div');
            row.className = `msg-row ${type}-row`;
            row.innerHTML = `
                <img src="${avatar}" class="avatar" style="width:30px; height:30px;">
                <div class="msg-content">
                    <span style="font-size:10px; color:#666; margin-bottom:4px;">${name}</span>
                    <div class="bubble ${type}-bubble">${text}</div>
                    <span style="font-size:9px; opacity:0.4; margin-top:4px;">${time}</span>
                </div>
            `;
            document.getElementById('messages').appendChild(row);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
        }
    </script>
</body>
</html>
