
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sujal Networks Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0b0d; color: white; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* Login Screen - Centered for Mobile */
        #login-screen { background: #151518; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px solid #333; z-index: 1000; }
        .btn { width: 100%; background: #00ff88; color: black; padding: 15px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; font-size: 16px; }
        input { width: 100%; background: #222; border: 1px solid #444; padding: 14px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; font-size: 16px; }

        #chat-app { display: none; width: 100%; height: 100vh; flex-direction: row; }
        
        /* Sidebar - Hidden on mobile by default */
        #sidebar { width: 280px; background: #121215; border-right: 1px solid #222; display: flex; flex-direction: column; transition: 0.3s ease; }
        
        /* Chat Area - Takes full width on mobile */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #0b0b0d; position: relative; }
        
        /* Header with Menu Toggle */
        #chat-header { padding: 15px 20px; background: #121215; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
        #menu-toggle { display: none; font-size: 24px; background: none; border: none; color: #00ff88; cursor: pointer; padding-right: 10px; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        
        /* Responsive Bubbles */
        .msg-row { display: flex; gap: 10px; max-width: 90%; }
        .sent-row { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .sent-bubble { background: #007bff; border-bottom-right-radius: 4px; }
        .received-bubble { background: #222; border-bottom-left-radius: 4px; }

        /* Input Area - Mobile Optimized */
        #form { padding: 15px; background: #121215; display: flex; gap: 8px; align-items: center; border-top: 1px solid #222; }
        #input { margin-bottom: 0; border-radius: 25px; padding: 12px 20px; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* MOBILE OVERRIDES (The Magic) */
        @media (max-width: 768px) {
            #menu-toggle { display: block; }
            #sidebar { 
                position: absolute; 
                left: -280px; 
                height: 100%; 
                z-index: 100; 
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            }
            #sidebar.open { left: 0; }
            .msg-row { max-width: 95%; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:#00ff88; margin-bottom:10px;">SUJAL NETWORKS</h2>
        <p style="color:#888; font-size:12px; margin-bottom:20px;">Elite Mobile Messaging</p>
        <input type="text" id="username-input" placeholder="Enter Name..." autocomplete="off">
        <button class="btn" onclick="login()">START CHAT</button>
    </div>

    <div id="chat-app">
        <div id="sidebar">
            <div style="padding:25px 20px; font-weight:800; color:#555; font-size:11px; letter-spacing:1px; text-transform:uppercase;">Network Users</div>
            <div id="user-list"></div>
            <button class="btn" style="background:#222; color:white; width:90%; margin:20px auto;" onclick="toggleSidebar()">CLOSE MENU</button>
        </div>
        
        <div id="chat-area">
            <div id="chat-header">
                <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div id="header-info" style="display:flex; align-items:center; gap:10px;">
                    <div style="width:10px; height:10px; background:#00ff88; border-radius:50%;"></div>
                    <span id="header-name" style="font-weight:700; font-size:14px;">Global Room</span>
                </div>
            </div>

            <div id="messages"></div>

            <form id="form" onsubmit="sendMessage(event)">
                <input id="input" autocomplete="off" placeholder="Message...">
                <button class="btn send-btn">🚀</button>
            </form>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "";
        let myAvatar = "";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function login() {
            myName = document.getElementById('username-input').value.trim();
            if (myName) {
                myAvatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${myName}`;
                socket.emit('login', myName);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-app').style.display = 'flex';
                // Focus input for mobile keyboard
                setTimeout(() => document.getElementById('input').focus(), 500);
            }
        }

        socket.on('load old msgs', (docs) => {
            docs.forEach(data => addMessage(data.user === myName ? 'sent' : 'received', data.user, data.avatar, data.text, data.time));
        });

        socket.on('chat message', (data) => {
            addMessage(data.user === myName ? 'sent' : 'received', data.user, data.avatar, data.text, data.time);
        });

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (input.value.trim()) {
                socket.emit('chat message', { user: myName, avatar: myAvatar, text: input.value, time: time });
                input.value = '';
            }
        }

        function addMessage(type, name, avatar, text, time) {
            const row = document.createElement('div');
            row.className = `msg-row ${type}-row`;
            row.innerHTML = `
                <div class="msg-content" style="display:flex; flex-direction:column; ${type === 'sent' ? 'align-items:flex-end' : ''}">
                    <div class="bubble ${type}-bubble">${text}</div>
                    <span style="font-size:9px; opacity:0.4; margin-top:4px;">${name} • ${time}</span>
                </div>
            `;
            document.getElementById('messages').appendChild(row);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
        }

        socket.on('user list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for (let id in users) {
                const el = document.createElement('div');
                el.style.padding = "12px 20px";
                el.style.borderBottom = "1px solid #1a1a1d";
                el.innerText = users[id].name;
                list.appendChild(el);
            }
        });
    </script>
</body>
</html>
