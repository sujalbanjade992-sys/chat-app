<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal's Network</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Login Screen */
        #entry-screen { background: #161616; padding: 40px; border-radius: 15px; text-align: center; width: 350px; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }
        .btn-main { width: 100%; padding: 12px; background: #00d2ff; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Chat Interface */
        #main-app { display: none; width: 95%; max-width: 600px; height: 80vh; background: #161616; border-radius: 15px; flex-direction: column; overflow: hidden; border: 1px solid #333; }
        #chat-header { padding: 20px; background: #222; border-bottom: 1px solid #333; text-align: center; }
        #messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0f0f0f; }
        .msg { background: #252525; padding: 10px 15px; border-radius: 10px; max-width: 80%; width: fit-content; }
        .msg b { color: #00d2ff; display: block; font-size: 12px; margin-bottom: 4px; }
        #input-area { padding: 20px; display: flex; gap: 10px; background: #161616; }
        #msgInput { margin-bottom: 0; }
        .send-btn { width: 80px; background: #00d2ff; color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <h1 style="color: #00d2ff; margin-top: 0;">Sujal's Network</h1>
        <p style="color: #888;">Enter your name to start chatting</p>
        <input type="text" id="userNameInput" placeholder="Your Name...">
        <button class="btn-main" onclick="joinApp()">JOIN CHAT</button>
    </div>

    <div id="main-app">
        <div id="chat-header">
            <h2 style="margin: 0; font-size: 18px;">Live Network Chat</h2>
            <small id="userTag" style="color: #888;"></small>
        </div>
        
        <div id="messages-container">
            </div>

        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Write a message...">
            <button class="send-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDazJG_ThTZKb75pyODj1IGMQQeaH7XupQ",
            authDomain: "sujal-networks.firebaseapp.com",
            projectId: "sujal-networks",
            storageBucket: "sujal-networks.firebasestorage.app",
            messagingSenderId: "835586269526",
            appId: "1:835586269526:web:c76ee92b9951499e8176f7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = "";

        // 1. JOIN THE APP
        async function joinApp() {
            const name = document.getElementById('userNameInput').value;
            if (!name) return alert("Enter a name!");

            currentUser = name;
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('userTag').innerText = "Logged in as: " + name;

            loadMessages();
        }

        // 2. SEND A MESSAGE
        async function sendMessage() {
            const text = document.getElementById('msgInput').value;
            if (!text) return;

            await db.collection("messages").add({
                user: currentUser,
                text: text,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });

            document.getElementById('msgInput').value = "";
        }

        // 3. LISTEN FOR MESSAGES (REAL-TIME)
        function loadMessages() {
            db.collection("messages").orderBy("time", "asc")
              .onSnapshot((snapshot) => {
                  const container = document.getElementById('messages-container');
                  container.innerHTML = ""; // Clear for reload
                  snapshot.forEach((doc) => {
                      const data = doc.data();
                      const div = document.createElement('div');
                      div.className = "msg";
                      div.innerHTML = `<b>${data.user}</b>${data.text}`;
                      container.appendChild(div);
                  });
                  container.scrollTop = container.scrollHeight; // Auto-scroll
              });
        }
        
        // Allow "Enter" key to send message
        document.getElementById("msgInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
