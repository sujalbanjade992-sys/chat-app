
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sujal's Chat System</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0f0f0f; color: white; display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available; overflow: hidden; }
        
        header { 
            background: #1a1a1a; 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid #00ff88; 
            font-weight: 900; 
            color: #00ff88; 
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #0f0f0f;
        }
        
        .msg { 
            max-width: 80%; 
            padding: 10px 15px; 
            border-radius: 18px; 
            position: relative;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .received { background: #2b2b2b; align-self: flex-start; border-bottom-left-radius: 2px; }
        .sent { background: #007bff; align-self: flex-end; border-bottom-right-radius: 2px; color: white; }

        .user-label { font-size: 11px; font-weight: 800; margin-bottom: 3px; text-transform: uppercase; }
        .received .user-label { color: #00ff88; }
        .sent .user-label { color: #e0e0e0; }

        /* Timestamp Style */
        .time { font-size: 9px; align-self: flex-end; margin-top: 4px; opacity: 0.6; }

        #form { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { flex: 1; background: #333; border: 1px solid #444; padding: 12px 18px; border-radius: 25px; color: white; outline: none; font-size: 16px; }
        button { background: #00ff88; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; color: #000; }
        
        #clear-btn { font-size: 10px; background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <span>SUJAL NETWORKS</span>
        <button id="clear-btn" onclick="clearChat()">CLEAR</button>
    </header>
    <div id="messages"></div>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Message..." />
        <button>Send</button>
    </form>

    <script>
        const socket = io();
        const messages = document.getElementById('messages');
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        
        // Notification Sound
        const notification = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

        let myName = prompt("Enter your nickname:") || "User";

        function clearChat() {
            if(confirm("Clear all messages?")) messages.innerHTML = '';
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                const now = new Date();
                const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
                socket.emit('chat message', { user: myName, text: input.value, time: timeStr });
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const item = document.createElement('div');
            item.className = `msg ${data.user === myName ? 'sent' : 'received'}`;
            
            item.innerHTML = `
                <span class="user-label">${data.user}</span>
                <span>${data.text}</span>
                <span class="time">${data.time}</span>
            `;
            
            messages.appendChild(item);
            messages.scrollTo(0, messages.scrollHeight);

            // Play sound if someone else sends a message
            if (data.user !== myName) {
                notification.play().catch(e => console.log("Sound blocked until user interacts"));
            }
        });
    </script>
</body>
</html>
