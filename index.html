
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sujal Networks Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #0b0b0d; color: white; height: 100vh; overflow: hidden; display: flex; }

        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: #0b0b0d; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: #151518; padding: 40px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #333; }

        /* Sidebar - Smart Responsive */
        #sidebar { width: 300px; background: #121215; border-right: 1px solid #222; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        
        /* Chat Area */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #0b0b0d; position: relative; }
        #chat-header { padding: 15px 20px; background: #121215; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        
        /* Messages */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; }
        .sent-row { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .sent-bubble { background: #007bff; border-bottom-right-radius: 2px; }
        .received-bubble { background: #222; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .dm-bubble { border: 1px solid #ff0077; box-shadow: 0 0 10px rgba(255, 0, 119, 0.2); }

        /* User List Styling */
        .user-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .user-item:hover { background: #1a1a1d; }
        .user-item.active { background: #007bff22; border-left: 4px solid #007bff; }

        /* Input */
        #form { padding: 15px; background: #121215; display: flex; gap: 10px; }
        input { flex: 1; background: #1a1a1d; border: 1px solid #333; padding: 12px 20px; border-radius: 25px; color: white; outline: none; }
        .send-btn { background: #00ff88; color: black; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* Responsive Mobile Tweak */
        @media (max-width: 768px) {
            #sidebar { position: absolute; left: 0; z-index: 100; transform: translateX(-100%); height: 100%; }
            #sidebar.open { transform: translateX(0); }
            #menu-btn { display: block !important; }
        }
        #menu-btn { display: none; background: none; border: none; color: #00ff88; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:#00ff88; margin-bottom:10px;">SUJAL NETWORKS</h1>
            <input type="text" id="username-input" placeholder="Your Name...">
            <button class="send-btn" style="height:50px; width:100%" onclick="login()">ENTER NETWORK</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding:25px; font-weight:800; border-bottom:1px solid #222;">ONLINE USERS</div>
        <div id="user-list"></div>
        <div style="margin-top:auto; padding:20px; font-size:10px; color:#555;">Click a name to start DM</div>
    </div>

    <div id="chat-area">
        <div id="chat-header">
            <button id="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
            <span id="target-display" style="font-weight:800;">Global Room</span>
            <button onclick="setTarget('global')" style="background:none; border:none; color:#00ff88; font-size:12px; cursor:pointer;">Back to Global</button>
        </div>
        <div id="messages"></div>
        <form id="form" onsubmit="sendMessage(event)">
            <input id="input" placeholder="Type message..." autocomplete="off">
            <button class="send-btn">SEND</button>
        </form>
    </div>

    <script>
        const socket = io();
        let myName = "", myId = "", targetId = "global", targetName = "Global Room";

        function login() {
            myName = document.getElementById('username-input').value.trim();
            if (myName) {
                socket.emit('login', myName);
                document.getElementById('login-screen').style.display = 'none';
            }
        }

        function setTarget(id, name = "Global Room") {
            targetId = id;
            targetName = name;
            document.getElementById('target-display').innerText = name;
            document.getElementById('messages').innerHTML = ''; // Clear for context
            socket.emit('request history', id); // Ask server for history
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
        }

        socket.on('load old msgs', (docs) => {
            docs.forEach(msg => addMessage(msg));
        });

        socket.on('chat message', (msg) => {
            if (msg.target === targetId || msg.target === 'global' || msg.senderId === targetId) {
                addMessage(msg);
            }
        });

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            if (!input.value.trim()) return;

            const msgData = {
                senderName: myName,
                text: input.value,
                target: targetId, // 'global' or a specific socket.id
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            socket.emit('chat message', msgData);
            input.value = '';
        }

        function addMessage(msg) {
            const isMe = msg.senderName === myName;
            const row = document.createElement('div');
            row.className = `msg-row ${isMe ? 'sent-row' : 'received-row'}`;
            
            const isDM = msg.target !== 'global';
            
            row.innerHTML = `
                <div class="msg-content">
                    <div class="bubble ${isMe ? 'sent-bubble' : 'received-bubble'} ${isDM ? 'dm-bubble' : ''}">
                        ${msg.text}
                    </div>
                    <span style="font-size:9px; opacity:0.4; margin-top:4px; display:block; text-align:${isMe?'right':'left'}">
                        ${msg.senderName} • ${msg.time} ${isDM ? '(DM)' : ''}
                    </span>
                </div>
            `;
            document.getElementById('messages').appendChild(row);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
        }

        socket.on('user list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for (let id in users) {
                if (id === socket.id) continue;
                const el = document.createElement('div');
                el.className = 'user-item';
                el.innerHTML = `<div style="width:10px; height:10px; background:#00ff88; border-radius:50%"></div> ${users[id].name}`;
                el.onclick = () => setTarget(id, users[id].name);
                list.appendChild(el);
            }
        });
    </script>
</body>
</html>
