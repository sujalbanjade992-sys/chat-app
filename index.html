<!DOCTYPE html>
<html>
<head>
    <title>Sujal Networks Elite</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        #sidebar { width: 260px; background: #15191c; padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        #main-chat { flex: 1; display: flex; flex-direction: column; background: #0b0e11; }
        #header { padding: 15px 25px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        #chat-title { margin: 0; color: #00ff88; font-size: 1.1rem; }
        #chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 20px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 15px; position: relative; }
        .my-message { align-self: flex-end; background: #007bff; }
        .other-message { align-self: flex-start; background: #23272a; border: 1px solid #333; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: #ff4d4d; border: none; border-radius: 50%; cursor: pointer; color: white; width: 18px; height: 18px; font-size: 10px; display: none; }
        .my-message:hover .delete-btn { display: block; }
        #input-area { padding: 20px; display: flex; gap: 10px; background: #15191c; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #23272a; color: white; outline: none; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #00ff88; font-weight: bold; cursor: pointer; }
        .user-item { padding: 10px; cursor: pointer; border-radius: 8px; margin-top: 5px; transition: 0.2s; }
        .user-item:hover { background: #2c2f33; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="color: #00ff88; margin-bottom:0;">SUJAL NETWORKS</h2>
        <p style="font-size:0.7rem; opacity:0.5; margin-bottom:20px;">SECURE V2.1</p>
        <div class="user-item" onclick="changeRoom('global', 'Global Network')">🌐 Global Network</div>
        <hr style="width:100%; border:0.5px solid #333;">
        <h4 style="opacity:0.6;">DIRECT MESSAGES</h4>
        <div id="user-list"></div>
    </div>
    <div id="main-chat">
        <div id="header">
            <h2 id="chat-title">Global Network</h2>
            <div id="typing-status" style="color:#00ff88; font-size:0.8rem;"></div>
        </div>
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Message..." oninput="handleTyping()">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = prompt("Enter Name:") || "User" + Math.floor(Math.random()*100);
        let target = 'global';
        socket.emit('login', myName);

        document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()) {
                socket.emit('chat message', { text: input.value, target: target });
                input.value = '';
                socket.emit('typing', { target: target, isTyping: false });
            }
        }

        socket.on('chat message', (data) => {
            const isMe = data.name === myName;
            const div = document.createElement('div');
            div.id = `msg-${data.id}`;
            div.className = `message ${isMe ? 'my-message' : 'other-message'}`;
            div.innerHTML = `<div style="font-size:0.7rem; opacity:0.7;">${data.name}</div><div>${data.text}</div>
                ${isMe ? `<button class="delete-btn" onclick="deleteMsg('${data.id}')">✕</button>` : ''}`;
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        function deleteMsg(id) { socket.emit('delete message', { msgId: id }); }
        socket.on('message deleted', (id) => { const el = document.getElementById(`msg-${id}`); if(el) el.remove(); });

        socket.on('update user list', (users) => {
            document.getElementById('user-list').innerHTML = users
                .filter(u => u.name !== myName)
                .map(u => `<div class="user-item" onclick="changeRoom('${u.id}', '${u.name}')">👤 ${u.name}</div>`).join('');
        });

        function changeRoom(id, name) {
            target = id;
            document.getElementById('chat-title').innerText = target === 'global' ? name : "DM: " + name;
            document.getElementById('chat-box').innerHTML = '';
        }

        function handleTyping() {
            socket.emit('typing', { target: target, isTyping: true });
            clearTimeout(window.t);
            window.t = setTimeout(() => socket.emit('typing', { target: target, isTyping: false }), 1500);
        }

        socket.on('display typing', (data) => {
            if(data.fromRoom === target || (target === 'global' && data.fromRoom === 'global')) {
                document.getElementById('typing-status').innerText = data.isTyping ? data.name + " is typing..." : "";
            }
        });
    </script>
</body>
</html>
