
<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ece5dd;
    }

    .header {
      background: #075e54;
      color: white;
      padding: 15px;
      font-size: 18px;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .message {
      max-width: 60%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      font-size: 14px;
    }

    .me {
      background: #dcf8c6;
      align-self: flex-end;
    }

    .other {
      background: white;
      align-self: flex-start;
    }

    .form {
      display: flex;
      padding: 10px;
      background: #f0f0f0;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #075e54;
      color: white;
      border-radius: 20px;
    }
  </style>
</head>
<body>

<div class="header">My Chat</div>

<div id="chat"></div>

<div class="form">
  <input id="input" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  let username = prompt("Enter your name:");

  function sendMessage() {
    const input = document.getElementById("input");
    if (input.value) {
      socket.emit("chat message", {
        user: username,
        text: input.value
      });
      input.value = "";
    }
  }

  socket.on("chat message", function(msg) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.classList.add("message");

    if (msg.user === username) {
      div.classList.add("me");
    } else {
      div.classList.add("other");
    }

    div.innerHTML = "<b>" + msg.user + ":</b> " + msg.text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });
</script>

</body>
</html>
