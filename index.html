
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal Networks Private</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #0b0b0d; color: white; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* Login Screen */
        #login-screen { background: #151518; padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        .logo { color: #00ff88; font-size: 24px; font-weight: 800; margin-bottom: 20px; display: block; }
        input { width: 100%; background: #222; border: 1px solid #444; padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; background: #00ff88; color: black; padding: 15px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; }

        /* Main Chat Layout */
        #chat-app { display: none; width: 100%; height: 100vh; flex-direction: row; }
        
        /* Sidebar */
        #sidebar { width: 260px; background: #121215; border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-weight: 800; color: #00ff88; border-bottom: 1px solid #222; }
        #user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; margin-bottom: 5px; }
        .user-item:hover { background: #1e1e22; }
        .user-item.active { background: #007bff; color: white; }

        /* Chat Area */
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #0b0b0d; }
        #chat-header { padding: 20px; background: #121215; border-bottom: 1px solid #222; font-weight: 600; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        /* Bubbles */
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .sent { align-self: flex-end; background: #007bff; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #222; border-bottom-left-radius: 2px; }

        #form { padding: 20px; background: #121215; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <span class="logo">SUJAL NETWORKS</span>
        <input type="text" id="username-input" placeholder="Enter your name...">
        <button class="btn" onclick="login()">Enter System</button>
    </div>

    <div id="chat-app">
        <div id="sidebar">
            <div class="sidebar-header">ONLINE USERS</div>
            <div id="user-list"></div>
        </div>
        <div id="chat-area">
            <div id="chat-header">Select a user to chat</div>
            <div id="messages"></div>
            <form id="form" onsubmit="sendMessage(event)">
                <input id="input" autocomplete="off" placeholder="Message..." disabled />
                <button class="btn" style="width: auto; padding: 0 20px;">Send</button>
            </form>
        </div>
    </div>

    <script>
        const socket = io();
        let currentReceiverId = null;
        let myName = "";

        function login() {
            myName = document.getElementById('username-input').value.trim();
            if (myName) {
                socket.emit('login', myName);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-app').style.display = 'flex';
            }
        }

        socket.on('user list', (users) => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            for (let id in users) {
                if (id !== socket.id) {
                    const el = document.createElement('div');
                    el.className = 'user-item';
                    el.innerText = users[id];
                    el.onclick = () => selectUser(id, users[id]);
                    list.appendChild(el);
                }
            }
        });

        function selectUser(id, name) {
            currentReceiverId = id;
            document.getElementById('chat-header').innerText = "Chatting with: " + name;
            document.getElementById('input').disabled = false;
            document.getElementById('messages').innerHTML = ''; // Clear for private chat
        }

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value && currentReceiverId) {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const msgData = { toId: currentReceiverId, text: input.value, time: time };
                
                socket.emit('private message', msgData);
                
                // Show on my screen
                addMessage('sent', input.value, time);
                input.value = '';
            }
        }

        socket.on('private message', (data) => {
            // Only show if we are chatting with that person
            if (data.fromId === currentReceiverId) {
                addMessage('received', data.text, data.time);
            } else {
                alert("New message from " + data.fromName);
            }
        });

        function addMessage(type, text, time) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<span>${text}</span><div style="font-size:10px; opacity:0.5; margin-top:5px;">${time}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTo(0, document.getElementById('messages').scrollHeight);
        }
    </script>
</body>
</html>
