<!DOCTYPE html>
<html>
<head>
    <title>Sujal Networks Elite</title>
    <style>
        :root { --accent: #00ff88; --bg: #0b0b0d; --card: #121215; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; height: 100vh; }
        
        #sidebar { width: 260px; background: var(--card); border-right: 1px solid #222; display: flex; flex-direction: column; }
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        
        .user-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #222; transition: 0.3s; }
        .user-item:hover { background: #1a1a1d; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 70%; }
        .me { background: #007bff; align-self: flex-end; }
        .other { background: #222; align-self: flex-start; }

        #typing-status { font-size: 12px; color: var(--accent); padding: 5px 20px; font-style: italic; }
        .form { display: flex; padding: 15px; background: var(--card); gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #1a1a1d; color: white; outline: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding:20px; font-weight:bold; color:var(--accent);">ONLINE USERS</div>
        <div id="user-list"></div>
        <button onclick="setTarget('global')" style="margin-top:auto; padding:15px; background:var(--accent); border:none; cursor:pointer; font-weight:bold;">🌍 GLOBAL ROOM</button>
    </div>

    <div id="chat-area">
        <div style="padding:15px; border-bottom:1px solid #222; font-weight:bold;">
            Chatting with: <span id="target-name" style="color:var(--accent)">Global</span>
        </div>
        <div id="messages"></div>
        <div id="typing-status"></div>
        <form class="form" onsubmit="send(event)">
            <input id="input" placeholder="Type a message..." autocomplete="off" oninput="handleTyping()">
            <button style="background:var(--accent); border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer;">SEND</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = localStorage.getItem("name") || prompt("Name:");
        localStorage.setItem("name", myName);
        let targetId = "global";
        let typingTimer;

        socket.emit("login", myName);

        function setTarget(id, name = "Global") {
            targetId = id;
            document.getElementById("target-name").innerText = name;
            document.getElementById("messages").innerHTML = ""; // Clear for new chat
        }

        function handleTyping() {
            socket.emit("typing", { isTyping: true, target: targetId });
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                socket.emit("typing", { isTyping: false, target: targetId });
            }, 2000);
        }

        socket.on("user typing", (data) => {
            const status = document.getElementById("typing-status");
            status.innerText = data.isTyping ? `${data.name} is typing...` : "";
        });

        socket.on("user list", (users) => {
            const list = document.getElementById("user-list");
            list.innerHTML = "";
            for (let id in users) {
                if (id === socket.id) continue;
                const div = document.createElement("div");
                div.className = "user-item";
                div.innerHTML = `<span style="color:var(--accent)">●</span> ${users[id].name}`;
                div.onclick = () => setTarget(id, users[id].name);
                list.appendChild(div);
            }
        });

        function send(e) {
            e.preventDefault();
            const val = document.getElementById("input").value;
            if(!val) return;
            socket.emit("chat message", {
                senderName: myName, text: val, target: targetId,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            document.getElementById("input").value = "";
        }

        socket.on("chat message", (msg) => {
            const div = document.createElement("div");
            div.className = `bubble ${msg.senderName === myName ? "me" : "other"}`;
            div.innerHTML = `<b>${msg.senderName}</b><br>${msg.text}`;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTo(0, document.getElementById("messages").scrollHeight);
        });

        socket.on("load old msgs", msgs => msgs.forEach(m => socket.emit("chat message", m)));
    </script>
</body>
</html>
