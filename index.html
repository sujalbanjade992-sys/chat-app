
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal's Chat System</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0f0f0f; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Branding Header */
        header { 
            background: #1a1a1a; 
            padding: 18px; 
            text-align: center; 
            border-bottom: 2px solid #00ff88; 
            font-weight: 900; 
            color: #00ff88; 
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Message Container */
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: linear-gradient(to bottom, #0f0f0f, #151515);
        }
        
        /* Modern Bubble Design */
        .msg { 
            max-width: 75%; 
            padding: 12px 18px; 
            border-radius: 20px; 
            line-height: 1.5; 
            font-size: 16px; 
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Messages from OTHERS */
        .received { 
            background: #2b2b2b; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
            border: 1px solid #444;
        }

        /* Messages from YOU */
        .sent { 
            background: #007bff; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
            color: white; 
        }

        /* THE NAME LABEL - High Visibility Fix */
        .user-label { 
            font-size: 12px; 
            font-weight: 800;
            margin-bottom: 6px; 
            text-transform: uppercase;
            display: block;
            letter-spacing: 1px;
        }
        
        /* Different colors for names so they pop */
        .received .user-label { color: #00ff88; } /* Green for friends */
        .sent .user-label { color: #e0e0e0; }    /* Light Grey for you */

        /* Input Bar */
        #form { 
            background: #1a1a1a; 
            padding: 20px; 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid #333; 
        }
        input { 
            flex: 1; 
            background: #333; 
            border: 1px solid #444; 
            padding: 14px 20px; 
            border-radius: 30px; 
            color: white; 
            outline: none; 
            font-size: 16px; 
        }
        input:focus { border-color: #00ff88; }
        
        button { 
            background: #00ff88; 
            border: none; 
            padding: 0 30px; 
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer; 
            color: #000; 
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        button:hover { background: #00cc6e; transform: scale(1.05); }
    </style>
</head>
<body>
    <header>SUJAL'S CHAT SYSTEM</header>
    <div id="messages"></div>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="Type your message..." />
        <button>Send</button>
    </form>

    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        // Force a name or default to User
        let myName = prompt("Enter your nickname:") || "User";
        myName = myName.trim();

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                const data = { user: myName, text: input.value };
                socket.emit('chat message', data);
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const item = document.createElement('div');
            item.classList.add('msg');
            
            // Check if current user sent it
            if (data.user === myName) {
                item.classList.add('sent');
            } else {
                item.classList.add('received');
            }

            item.innerHTML = `
                <span class="user-label">${data.user}</span>
                <span class="text-content">${data.text}</span>
            `;
            messages.appendChild(item);
            messages.scrollTo(0, messages.scrollHeight);
        });
    </script>
</body>
</html>
