<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sujal Networks Elite</title>
  <style>
    :root { --main: #075e54; --bg: #ece5dd; --me: #dcf8c6; }
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }

    .header { background: var(--main); color: white; padding: 15px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

    #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }

    .message { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .me { background: var(--me); align-self: flex-end; border-top-right-radius: 2px; }
    .other { background: white; align-self: flex-start; border-top-left-radius: 2px; }

    .user-name { font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; color: var(--main); }

    .form { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
    input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
    button { margin-left: 10px; padding: 0 20px; border: none; background: var(--main); color: white; border-radius: 25px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<div class="header">Sujal Networks Elite</div>
<div id="chat"></div>

<form class="form" id="chat-form">
  <input id="input" placeholder="Type a message..." autocomplete="off" />
  <button type="submit">Send</button>
</form>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let username = localStorage.getItem("chat-username");

  // If no username, ask once and save it in the browser's permanent memory
  if (!username) {
    username = prompt("Enter your commercial alias:");
    localStorage.setItem("chat-username", username);
  }

  const chat = document.getElementById("chat");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("input");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    if (input.value) {
      socket.emit("chat message", {
        user: username,
        text: input.value
      });
      input.value = "";
    }
  });

  // --- LOAD HISTORY FROM DATABASE ---
  socket.on("load history", (messages) => {
    messages.forEach(appendMessage);
  });

  socket.on("chat message", appendMessage);

  function appendMessage(msg) {
    const div = document.createElement("div");
    div.classList.add("message");
    div.classList.add(msg.user === username ? "me" : "other");

    div.innerHTML = `<span class="user-name">${msg.user}</span>${msg.text}`;
    
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
