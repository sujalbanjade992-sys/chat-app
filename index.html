<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Sujal Networks Elite</title>
    <style>
        :root { --bg: #000; --me: #248bf5; --other: #262629; --accent: #00ff88; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; overflow: hidden; }

        /* BRANDING OVERLAY */
        #launch-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* iMESSAGE BUBBLE EFFECTS */
        #chat {
            height: calc(100vh - 70px); overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; scroll-behavior: smooth;
        }

        .bubble {
            max-width: 70%; padding: 10px 16px; border-radius: 20px; margin-bottom: 4px;
            font-size: 15px; line-height: 1.4; position: relative;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .me { background: var(--me); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .other { background: var(--other); align-self: flex-start; border-bottom-left-radius: 4px; color: white; }

        .name-tag { font-size: 10px; opacity: 0.5; margin-bottom: 2px; margin-left: 12px; }

        /* INPUT AREA */
        .input-box {
            height: 70px; background: rgba(20,20,20,0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 15px; border-top: 0.5px solid #333;
        }
        input {
            flex: 1; background: #1c1c1e; border: 1px solid #333; padding: 10px 15px;
            border-radius: 20px; color: white; outline: none; font-size: 16px;
        }
        .send-btn { color: var(--me); font-weight: 600; margin-left: 15px; cursor: pointer; }

        #typing { font-size: 12px; color: gray; position: absolute; bottom: 80px; left: 20px; }
    </style>
</head>
<body>

<div id="launch-screen">
    <h1 style="color:var(--accent); letter-spacing: 5px; font-weight: 900;">SUJAL NETWORKS</h1>
    <p style="opacity:0.4; margin-bottom: 40px;">ELITE EDITION</p>
    <input type="text" id="username" placeholder="Your Name" style="width:200px; text-align:center; margin-bottom: 20px;">
    <button onclick="enterApp()" style="background:var(--accent); color:black; border:none; padding:10px 30px; border-radius:30px; font-weight:bold;">ENTER</button>
</div>

<div id="chat"></div>
<div id="typing"></div>

<div class="input-box">
    <input id="msg-input" placeholder="iMessage" oninput="isTyping()">
    <div class="send-btn" onclick="send()">Send</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myUser = "";

    function enterApp() {
        const input = document.getElementById('username');
        if(!input.value) return;
        myUser = input.value;
        document.getElementById('launch-screen').style.transform = "translateY(-100%)";
        socket.emit('login', myUser);
    }

    function send() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        socket.emit('chat message', { user: myUser, text: input.value });
        input.value = "";
        socket.emit('typing', { user: myUser, typing: false });
    }

    function isTyping() {
        socket.emit('typing', { user: myUser, typing: true });
        clearTimeout(window.t);
        window.t = setTimeout(() => socket.emit('typing', { user: myUser, typing: false }), 2000);
    }

    socket.on('chat message', (msg) => {
        const chat = document.getElementById('chat');
        const isMe = msg.user === myUser;
        
        const container = document.createElement('div');
        container.style.display = "flex";
        container.style.flexDirection = "column";

        if(!isMe) {
            const name = document.createElement('span');
            name.className = "name-tag";
            name.innerText = msg.user;
            container.appendChild(name);
        }

        const div = document.createElement('div');
        div.className = `bubble ${isMe ? 'me' : 'other'}`;
        div.innerText = msg.text;
        
        container.appendChild(div);
        chat.appendChild(container);
        chat.scrollTop = chat.scrollHeight;
    });

    socket.on('display typing', (data) => {
        const status = document.getElementById('typing');
        status.innerText = data.typing ? `${data.user} is typing...` : "";
    });
</script>

</body>
</html>
